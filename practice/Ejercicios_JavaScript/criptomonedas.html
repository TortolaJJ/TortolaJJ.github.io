<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor cripto simple</title>
  <style>
      #seleccionarMoneda{
          background-color: aqua;

      }

      #resultados{
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        
      }

      li{
         list-style: none;
         background: lightblue;
         padding: 15px;
         border-radius: 10px;
         width: 120px;
         text-align: center;
         
         margin-top: 20px;
}

      h1{
        background-color: aqua;
      }

      #convertir {
        background-color: red;
      }

 




  </style>

</head>
<body>
  <div class="contenedor">
    <h1>Conversor de criptomonedas</h1>

    <div class="formulario">
      Euros: <input type="number" id="cantidad" value="100" min="0" step="0.01">
      <input type="button" id="convertir" value="Convertir">
    </div>

    <div id="resultados" class="resultados"></div>
    <p id="error" class="error"></p>
  </div>

  <select id ="seleccionarMoneda">
      <option value="EUR"> EUR</option>
      <option value="USD"> USD</option>
      <option value="GBP"> GBP</option>
      
  </select>
    

  <script>
    //variables
    //moneda
    let moneda = "EUR";
    // criptos
    let lista= ["BTC", "ETH", "SOL", "DOGE"]
    let cantidad = document.getElementById("cantidad");
    let convertirBtn = document.getElementById("convertir");
    let resultados = document.getElementById("resultados");
    let error = document.getElementById("error");
    let seleccionarMoneda = document.getElementById("seleccionarMoneda")


    
    /*
      Devuelve un li con los datos de la moneda
    */
    function creaElemento(cripto,cambio,cantidad) {    
      /*  ACABALO  */        
      //let liElement ...
     let total = parseFloat(cantidad.value) * parseFloat(cambio)
      let liElement =document.createElement("li")
      liElement.textContent = cripto + "=>" + total + " " + seleccionarMoneda.value
      

      /*  FIN ACABALO  */
      return liElement
    }
    

    async function convertir() {
      let monedaSeleccion = seleccionarMoneda.value
      error.textContent = "";
      resultados.innerHTML = "";
      
      // cuanto dinero
      const valor = parseFloat(cantidad.value);
      //errores
      if (isNaN(valor) || valor <= 0) {
        error.textContent = "Introduce una cantidad válida";
        return;
      }


      // pido el precio de cada cripto
      let listaResultados = [];
      let url =""
      let ulElement=document.createElement("ul")

      // esta api solo permite 1 moneda cada vez por eso el bucle
      lista.forEach((cripto) => {
        console.log(cripto)
        url = `https://api.coinbase.com/v2/prices/${cripto}-${monedaSeleccion}/spot`;

        fetch(url)
        .then(response => response.json())
        .then(datos => {
            /*  ACABALO  */
            // haz cosas con los datos                
            let cambio=datos.data.amount
            console.log("==>"+cambio);

            let li = creaElemento(cripto,cambio,cantidad)
            ulElement.appendChild(li)


            //usa creaElemento(cripto,cambio,cantidad)
            /*  FIN ACABALO  */    

        })
        .catch(e => {
          console.log("ERROR: " + e)
          error.textContent = "Error al obtener los datos"
        });       
      })
      resultados.appendChild(ulElement)

    }

    //eventos
    convertirBtn.addEventListener("click", () => {
      console.log("click")
      convertir()
    });

    //main
  </script>
</body>
</html>
