<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio simple</title>
    <style>

     #resultado{

        display:flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
       


     }

     li{

        list-style: none;
        background-color: white;
        padding: 10px;
        width: 120px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        text-align: center;
        font-weight: bold;
        margin-top: 20px ;



     }


     #convertir{
        background-color: aqua;
     }

     #moneda{
        background-color: rgb(73, 246, 10);
     }

     h1{
        font-family: Arial, Helvetica, sans-serif;
        background-color: aquamarine;
     }

    </style>
</head>
    
<body>
    <h1>Conversor de divisas</h1>
    <h2>con https://frankfurter.dev/</h2>
    Cantidad: <input type="number" id="cantidad" value="1">
    <br> <input type="button" value="Convertir" id="convertir">
    <div id="resultado"></div>
    Moneda Origen: <select id="moneda">
    <option value="EUR">EUR</option>
    <option value="AUD">AUD</option>
    <option value="BRL">BRL</option>
    <option value="CAD">CAD</option>
    <option value="CHF">CHF</option>
    <option value="CNY">CNY</option>
    <option value="CZK">CZK</option>
    <option value="DKK">DKK</option>
    <option value="GBP">GBP</option>
    <option value="HKD">HKD</option>
    <option value="HUF">HUF</option>
    <option value="IDR">IDR</option>
    <option value="ILS">ILS</option>
    <option value="INR">INR</option>
    <option value="ISK">ISK</option>
    <option value="JPY">JPY</option>
    <option value="KRW">KRW</option>
    <option value="MXN">MXN</option>
    <option value="MYR">MYR</option>
    <option value="NOK">NOK</option>
    <option value="NZD">NZD</option>
    <option value="PHP">PHP</option>
    <option value="PLN">PLN</option>
    <option value="RON">RON</option>
    <option value="SEK">SEK</option>
    <option value="SGD">SGD</option>
    <option value="THB">THB</option>
    <option value="TRY">TRY</option>
    <option value="USD">USD</option>
    <option value="ZAR">ZAR</option>
</select>
    <script>
       // let moneda="EUR"
        //let moneda="USD"
       // let url=`https://api.frankfurter.dev/v1/latest?base=${moneda}`

        let cantidad=document.getElementById("cantidad")
        let convertirBtn=document.getElementById("convertir")
        let resultado=document.getElementById("resultado")
        let tipoMoneda = document.getElementById("moneda")

        //funciones
        /*
            Devuelve un li con los datos de la moneda
        */
        function creaElemento(valor, clave) {            
            let total= Math.round(parseFloat(cantidad.value)*parseFloat(valor)*100)/ 100
            /*  ACABALO  */

           
            let liElement =document.createElement("li")
            liElement.textContent =  clave +  " : " + cantidad.value + "=> " + tipoMoneda.value + "=>" + total
            




            
            //let liElement ....
            /*  FIN ACABALO  */    
            return liElement
        }

        
        /*
            Obtiene los cambios y los pinta en pantalla 
        */


           

        async function convertir(){   

            let moneda = tipoMoneda.value
            let url = `https://api.frankfurter.dev/v1/latest?base=${moneda}`
                
            //resultado.innerHTML=`1 ${moneda} = ${datos["rates"][moneda]} USD`
            fetch(url)
                .then(response => response.json())
                .then(datos => {
                    // haz cosas con los datos
                    
                    
                    console.log(datos);
                    let cambios=Object.entries(datos.rates)   
                    let titulo = document.createElement("p") 
                    titulo.textContent = cantidad.value + moneda + "=>"   
                    resultado.appendChild(titulo)    
                    
                    let lista = document.createElement("ul")
                    resultado.appendChild(lista)

                    cambios.forEach(([clave, valor]) => {
                        console.log(clave, valor);
                        /*  ACABALO  */
                            
                            lista.appendChild(creaElemento(valor,clave))
            
                        //usa creaElemento(valor, clave)
                        /*  FIN ACABALO  */    
                    });
                    
                })
                .catch(error => console.log(error));                        
        }
        //eventos
        convertirBtn.addEventListener("click", function(){
            resultado.innerHTML=""
            convertir()
        })
        


    </script>
</body>
</html>
